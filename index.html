<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road.ag · Relatório de Gestão</title>
<style>
:root{
  --pink:#e54988;--purple:#b250ff;--deep:#561281;
  --pink-light:#fce8f1;--purple-light:#f3e8ff;--deep-light:#ede0f7;
  --red:#ef4444;--red-bg:#fef2f2;--red-border:#fecaca;
  --amber:#f59e0b;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --green:#22c55e;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --blue:#3b82f6;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --gray-bg:#f4f4f4;--gray-border:#e0e0e0;--gray-text:#888;
  --bg:#f8f7f5;--surface:#fff;--border:#e8e6e0;--border-light:#f0eeea;
  --text:#1a1916;--text-2:#6b6860;--text-3:#9c9a94;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 4px 16px rgba(0,0,0,.10)
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:54px;position:sticky;top:0;z-index:200;box-shadow:0 1px 0 var(--border)}
.logo{font-size:15px;font-weight:800;letter-spacing:-.01em;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sep{width:1px;height:22px;background:var(--border)}
.header-title{font-size:14px;font-weight:500;flex:1;color:var(--text-2)}
.header-date{font-size:12px;color:var(--text-3)}
.btn{font-size:12px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg);color:var(--text)}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none}
.btn-primary:hover{opacity:.9;color:#fff}
.btn.loading{opacity:.5;pointer-events:none}
.main{padding:1.5rem;max-width:1200px;margin:0 auto}
.tab-nav{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab-btn{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.on{color:var(--deep);border-bottom-color:var(--purple);font-weight:600}
.tab-sec{display:none}.tab-sec.on{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:800px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pink),var(--purple))}
.kpi-val{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em}
.kpi-lbl{font-size:11px;color:var(--text-3);margin-top:5px;font-weight:500}
.kpi-delta{font-size:11px;font-weight:600;margin-top:4px}
.delta-up{color:var(--green)}.delta-dn{color:var(--red)}.delta-eq{color:var(--text-3)}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin:1.5rem 0 .75rem}
.section-label:first-child{margin-top:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:12px;box-shadow:var(--shadow)}
.pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap;letter-spacing:.02em}
.pill-r{background:var(--red-bg);color:var(--red)}
.pill-a{background:var(--amber-bg);color:var(--amber)}
.pill-g{background:var(--green-bg);color:var(--green)}
.pill-b{background:var(--blue-bg);color:var(--blue)}
.pill-n{background:var(--gray-bg);color:var(--gray-text);border:1px solid var(--gray-border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text-3);padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em}
td{padding:8px 8px;border-bottom:1px solid var(--border-light);color:var(--text-2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.sem-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.sem-r{background:var(--red)}.sem-a{background:var(--amber)}.sem-g{background:var(--green)}.sem-n{background:var(--gray-text)}
.gestor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .15s}
.gestor-card:hover{box-shadow:var(--shadow-md)}
.gestor-header{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;user-select:none}
.gestor-header:hover{background:var(--bg)}
.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border)}
.avatar-fallback{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.gestor-info{flex:1;min-width:0}
.gestor-name{font-size:15px;font-weight:600;color:var(--text)}
.gestor-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.gestor-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.gestor-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border-light)}
.gestor-body.open{display:block}
.gestor-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.gkpi{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;border:1px solid var(--border-light)}
.gkpi-val{font-size:22px;font-weight:700;letter-spacing:-.02em}
.gkpi-lbl{font-size:10px;color:var(--text-3);margin-top:3px;font-weight:500}
.prog-wrap{background:var(--border-light);border-radius:99px;height:6px;width:100%;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.al-item{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;border-left:3px solid;position:relative}
.al-v{background:var(--red-bg);border-color:var(--red)}
.al-a{background:var(--amber-bg);border-color:var(--amber)}
.al-b{background:var(--blue-bg);border-color:var(--blue)}
.al-title{font-size:12px;font-weight:700}
.al-v .al-title{color:#991b1b}.al-a .al-title{color:#92400e}.al-b .al-title{color:#1e40af}
.al-desc{font-size:11px;margin-top:4px;line-height:1.5}
.al-v .al-desc{color:#b91c1c}.al-a .al-desc{color:#b45309}.al-b .al-desc{color:#1d4ed8}
.al-acao{font-size:11px;font-weight:600;margin-top:6px}
.al-v .al-acao{color:var(--red)}.al-a .al-acao{color:var(--amber)}.al-b .al-acao{color:var(--blue)}
.al-tag{position:absolute;top:10px;right:12px;font-size:10px;padding:2px 8px;border-radius:99px;background:rgba(0,0,0,.07);font-weight:600}
.insight-box{background:linear-gradient(135deg,var(--purple-light),var(--pink-light));border:1px solid #d8b4fe;border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1.5rem}
.insight-title{font-size:12px;font-weight:700;color:var(--deep);margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.insight-item{font-size:12px;color:var(--deep);line-height:1.8;padding-left:14px;position:relative}
.insight-item::before{content:'›';position:absolute;left:0;font-weight:700}
.ia-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:1.5rem}
.ia-title{font-size:13px;font-weight:600;color:var(--deep);margin-bottom:.8rem;display:flex;align-items:center;gap:8px}
.ia-item{border-left:3px solid var(--purple);padding:8px 12px;margin-bottom:8px;background:var(--purple-light);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.ia-item:last-child{margin-bottom:0}
.ia-item-text{font-size:12px;color:var(--deep);line-height:1.5}
.ia-loading{font-size:12px;color:var(--text-3);padding:1rem 0;text-align:center}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.rank-item:last-child{border-bottom:none}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:11px;padding:4px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;font-weight:500;transition:all .15s}
.filter-btn:hover{background:var(--bg)}
.filter-btn.on{background:var(--deep);color:#fff;border-color:var(--deep)}
.snap-ok{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);border-radius:var(--radius-sm);padding:6px 12px;font-size:11px;font-weight:600;margin-bottom:1rem}
.snap-no{background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber);border-radius:var(--radius-sm);padding:6px 12px;font-size:11px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn-lembrete{font-size:11px;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--amber-border);background:var(--surface);color:var(--amber);cursor:pointer;font-weight:600}
.btn-lembrete:hover{background:var(--amber-bg)}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--text-3);font-size:13px;padding:2.5rem 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:420px;max-width:95vw;box-shadow:var(--shadow-md)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--deep)}
.modal-check{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px;cursor:pointer}
.modal-check:last-of-type{border-bottom:none}
.modal-check input{width:15px;height:15px;accent-color:var(--purple);cursor:pointer}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.perf-chart-empty{background:var(--bg);border-radius:var(--radius-sm);padding:2rem;text-align:center;font-size:12px;color:var(--text-3);border:1px dashed var(--border)}
.last-update{font-size:11px;color:var(--text-3);text-align:right;margin-bottom:.75rem}
.atrasada-item{background:var(--red-bg);border-left:3px solid var(--red);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:7px}
.atrasada-title{font-size:12px;font-weight:600;color:#991b1b}
.atrasada-meta{font-size:11px;color:var(--red);margin-top:3px}
@media print{.header .btn,.tab-nav,.filter-bar,.btn-lembrete,.btn-primary,.modal-overlay{display:none!important}.tab-sec{display:block!important}body{background:#fff}.main{padding:0}.gestor-body{display:block!important}@page{size:A4;margin:15mm}}
</style>
</head>
<body>
<div class="header">
  <span class="logo">Road.ag</span>
  <div class="sep"></div>
  <span class="header-title">Relatório de Gestão</span>
  <span class="header-date" id="h-date"></span>
  <button class="btn" id="btn-refresh" onclick="carregar()">↻ Atualizar</button>
  <button class="btn btn-primary" onclick="abrirModalPDF()">⬇ Exportar PDF</button>
</div>

<div class="main" id="main">
  <div class="loading-screen"><div class="spinner"></div><div style="font-size:13px;color:var(--text-3)">Carregando dados...</div></div>
</div>

<div class="modal-overlay" id="modal-pdf" style="display:none" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-title">⬇ Exportar Relatório PDF</div>
    <div style="font-size:12px;color:var(--text-3);margin-bottom:1rem">Selecione o que incluir:</div>
    <label class="modal-check"><input type="checkbox" id="pdf-semaforo" checked> Semáforo por gestor</label>
    <label class="modal-check"><input type="checkbox" id="pdf-alertas" checked> Alertas críticos e de atenção</label>
    <label class="modal-check"><input type="checkbox" id="pdf-pendencias" checked> Pendências em aberto</label>
    <label class="modal-check"><input type="checkbox" id="pdf-conclusao" checked> Taxa de conclusão por gestor</label>
    <label class="modal-check"><input type="checkbox" id="pdf-briefing"> Briefings da semana</label>
    <label class="modal-check"><input type="checkbox" id="pdf-ia"> Sugestões analíticas (IA)</label>
    <div class="modal-actions">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="gerarPDF()">Gerar PDF</button>
    </div>
  </div>
</div>

// ── CSV ──
async function lerAba(nome){
  try{
    const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(nome)}&t=${Date.now()}`);
    if(!r.ok)return[];
    const txt=await r.text();
    if(nome==='sessoes'){
      // Sessoes NÃO tem cabeçalho — mapear colunas por posição
      const lines=txt.trim().split('\n').filter(l=>l.trim());
      return lines.map(l=>{
        const vals=parseLine(l).map(v=>v.replace(/"/g,'').trim());
        // Detecta se é linha de cabeçalho (primeira coluna não é timestamp ISO)
        if(!vals[0]||!vals[0].match(/^\d{4}-\d{2}-\d{2}T/))return null;
        return{data_hora:vals[0],usuario:vals[1]||'',data:vals[2]||'',hora:vals[3]||'',dia_semana:vals[4]||''};
      }).filter(Boolean);
    }
    return parseCSV(txt);
  }catch(e){console.warn('Erro aba',nome,e);return[];}
}
function parseCSV(txt){
  const lines=txt.trim().split('\n');if(lines.length<2)return[];
  const headers=parseLine(lines[0]).map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).map(l=>{
    const vals=parseLine(l),obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/"/g,'').trim());
    return obj;
  }).filter(o=>Object.values(o).some(v=>v));
}
function parseLine(line){
  const result=[],re=/("(?:[^"]|"")*"|[^,]*)/g;let m;
  while((m=re.exec(line))!==null){if(m.index===re.lastIndex)re.lastIndex++;result.push(m[1]);}
  return result;
}

// ── SNAPSHOT POR GESTOR (BUG FIX PRINCIPAL) ──
// Problema anterior: recriava resumo do zero ignorando o que já vinha no JSON
// Fix: usa o resumo do JSON diretamente; só recalcula se não existir
function getSnapshotPorGestor(){
  const snaps={};
  dadosSnapshots.forEach(s=>{
    if(!s.usuario)return;
    // Match defensivo: "Vinicius Fioretti" ainda bate com "Vinicius"
    const key=GESTORES.find(g=>s.usuario.toLowerCase().includes(g.toLowerCase()));
    if(!key)return;
    const dataHora=new Date(s.data_hora||s.timestamp||0);
    if(isNaN(dataHora))return;
    if(snaps[key]&&dataHora<=snaps[key]._dataHora)return;
    let estado={};
    try{estado=JSON.parse(s.estado||s.dados||'{}');}catch(e){return;}
    // USA o resumo que já vem no JSON — não recalcula
    if(!estado.resumo){
      // Fallback apenas se resumo ausente
      const bf=estado.briefing||[];
      estado.resumo={
        urgentes:bf.filter(x=>!x.done&&!x.concluido&&(x.status==='urgente'||x.urgente)).length,
        abertos:bf.filter(x=>!x.done&&!x.concluido).length,
        concluidos:bf.filter(x=>x.done||x.concluido).length,
        followupsPendentes:(estado.followup||[]).filter(x=>!x.done).length
      };
    }
    snaps[key]={...s,_estado:estado,_dataHora:dataHora,_dataFormatada:dataHora.toLocaleDateString('pt-BR')};
  });
  return snaps;
}

function getSnapshotSemanaAnterior(){
  const hoje=new Date(),ini=new Date(hoje);
  ini.setDate(hoje.getDate()-hoje.getDay()+1);ini.setHours(0,0,0,0);
  const snaps={};
  dadosSnapshots.forEach(s=>{
    if(!s.usuario)return;
    const key=GESTORES.find(g=>s.usuario.toLowerCase().includes(g.toLowerCase()));
    if(!key)return;
    const d=new Date(s.data_hora||s.timestamp||0);
    if(isNaN(d)||d>=ini)return;
    if(snaps[key]&&d<=snaps[key]._dataHora)return;
    let estado={};
    try{estado=JSON.parse(s.estado||s.dados||'{}');}catch(e){return;}
    if(!estado.resumo){const bf=estado.briefing||[];estado.resumo={urgentes:bf.filter(x=>!x.done&&(x.status==='urgente'||x.urgente)).length,abertos:bf.filter(x=>!x.done).length,concluidos:bf.filter(x=>x.done).length,followupsPendentes:(estado.followup||[]).filter(x=>!x.done).length};}
    snaps[key]={...s,_estado:estado,_dataHora:d};
  });
  return snaps;
}

// ── ATIVOS 7 DIAS (BUG FIX: match por nome parcial) ──
function getAtivos7dias(){
  const hoje=new Date(),set7=new Set();
  dadosSessoes.forEach(s=>{
    try{
      const d=new Date(s.data_hora||s.timestamp||'');
      if(isNaN(d)||(hoje-d)/86400000>7)return;
      const key=GESTORES.find(g=>s.usuario&&s.usuario.toLowerCase().includes(g.toLowerCase()));
      if(key)set7.add(key);
    }catch(e){}
  });
  return set7;
}

// ── SEMÁFORO (BUG FIX: sem snapshot = neutro, não vermelho) ──
function getSemaforo(snap){
  if(!snap)return'n'; // neutro — sem dados, não erro
  const urg=snap._estado?.resumo?.urgentes||0;
  if(urg>=3)return'r';
  if(urg>=1)return'a';
  return'g';
}
function getSemaforoLabel(s){return{r:'Atenção',a:'Monitorar',g:'OK',n:'Sem dados'}[s]||'—';}
function getSemaforoCor(s){return{r:'var(--red)',a:'var(--amber)',g:'var(--green)',n:'var(--gray-text)'}[s]||'#888';}
function getSemaforoPill(s){return{r:'pill-r',a:'pill-a',g:'pill-g',n:'pill-n'}[s]||'pill-n';}

function delta(atual,anterior){
  if(anterior===undefined||anterior===null)return'';
  const d=atual-anterior;
  if(d===0)return`<span class="kpi-delta delta-eq">= igual</span>`;
  return d>0?`<span class="kpi-delta delta-up">↑ +${d} vs ant.</span>`:`<span class="kpi-delta delta-dn">↓ ${d} vs ant.</span>`;
}

}

  <div class="last-update">Atualizado: ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-val">${totalSnaps}<span style="font-size:16px;color:var(--text-3)">/${GESTORES.length}</span></div><div class="kpi-lbl">Snapshots esta semana</div>${delta(totalSnaps,totalSnapsAnt)}</div>
    <div class="kpi"><div class="kpi-val">${totalAb}</div><div class="kpi-lbl">Demandas em aberto</div>${delta(totalAb,totalAbAnt)}</div>
    <div class="kpi"><div class="kpi-val" style="color:var(--green)">${totalCo}</div><div class="kpi-lbl">Concluídas</div>${delta(totalCo,totalCoAnt)}</div>
    <div class="kpi"><div class="kpi-val" style="color:${totalUrg>0?'var(--red)':'var(--green)'}">${totalUrg}</div><div class="kpi-lbl">Urgentes abertas</div></div>
    <div class="kpi"><div class="kpi-val">${txCo}%</div><div class="kpi-lbl">Taxa de conclusão</div>${txCoAnt!==null?delta(txCo,txCoAnt):''}</div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn ${curTab==='visao-geral'?'on':''}" onclick="goTab('visao-geral')">Visão Geral</button>
    <button class="tab-btn ${curTab==='gestores'?'on':''}" onclick="goTab('gestores')">Gestores</button>
    <button class="tab-btn ${curTab==='alertas'?'on':''}" onclick="goTab('alertas')">Alertas</button>
    <button class="tab-btn ${curTab==='performance'?'on':''}" onclick="goTab('performance')">Performance</button>
    <button class="tab-btn ${curTab==='atrasadas'?'on':''}" onclick="goTab('atrasadas')">Atrasadas</button>
  </div>
  <div id="tab-visao-geral" class="tab-sec ${curTab==='visao-geral'?'on':''}">${renderVisaoGeral(snaps,ativosSet)}</div>
  <div id="tab-gestores" class="tab-sec ${curTab==='gestores'?'on':''}">${renderGestores(snaps,ativosSet)}</div>
  <div id="tab-alertas" class="tab-sec ${curTab==='alertas'?'on':''}">${renderAlertas(snaps)}</div>
  <div id="tab-performance" class="tab-sec ${curTab==='performance'?'on':''}">${renderPerformance(snaps)}</div>
  <div id="tab-atrasadas" class="tab-sec ${curTab==='atrasadas'?'on':''}">${renderAtrasadas(snaps)}</div>`;

  if(iaGerado){const b=document.getElementById('ia-result');if(b)b.innerHTML=iaGerado;}
}

function goTab(t){
  curTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes(`'${t}'`)));
  document.querySelectorAll('.tab-sec').forEach(s=>s.classList.toggle('on',s.id==='tab-'+t));
}

// ── VISÃO GERAL ──
function renderVisaoGeral(snaps,ativosSet){
  const semSemana=GESTORES.filter(g=>!snaps[g]);
  const inativos=GESTORES.filter(g=>!ativosSet.has(g));
  const comUrg=GESTORES.filter(g=>(snaps[g]?._estado?.resumo?.urgentes||0)>0);
  let insights=[];
  if(semSemana.length)insights.push(`<strong>${semSemana.join(', ')}</strong> ainda não enviaram snapshot desta semana`);
  if(inativos.length)insights.push(`<strong>${inativos.join(', ')}</strong> não acessaram o painel nos últimos 7 dias`);
  if(comUrg.length)insights.push(`Urgentes em aberto: <strong>${comUrg.join(', ')}</strong>`);

  let h='';
  if(insights.length)h+=`<div class="insight-box"><div class="insight-title">✦ Destaques da semana</div>${insights.map(i=>`<div class="insight-item">${i}</div>`).join('')}</div>`;

  // Tabela semáforo
  h+=`<div class="section-label">Status por gestor</div><div class="card"><table>
    <tr><th>Gestor</th><th>Área</th><th>Status</th><th>Snapshot</th><th>Urgentes</th><th>Em aberto</th><th>Concluídos</th><th>Conclusão</th></tr>`;
  GESTORES.forEach(g=>{
    const snap=snaps[g],sem=getSemaforo(snap),r=snap?._estado?.resumo||{};
    const t=(r.abertos||0)+(r.concluidos||0),tx=t>0?Math.round((r.concluidos||0)/t*100):null;
    h+=`<tr>
      <td style="font-weight:600"><div style="display:flex;align-items:center;gap:8px">${avatarHtml(g,28)}<span>${g}</span></div></td>
      <td style="font-size:11px;color:var(--text-3)">${AREAS[g]}</td>
      <td><div style="display:flex;align-items:center;gap:5px"><span class="sem-dot sem-${sem}"></span><span style="font-size:11px;font-weight:600;color:${getSemaforoCor(sem)}">${getSemaforoLabel(sem)}</span></div></td>
      <td style="font-size:11px">${snap?`<span style="color:var(--green);font-weight:600">✓ ${snap._dataFormatada}</span>`:`<span style="color:var(--amber);font-weight:600">pendente</span>`}</td>
      <td style="font-weight:600;color:${(r.urgentes||0)>0?'var(--red)':'var(--text)'}">${r.urgentes??'—'}</td>
      <td>${r.abertos??'—'}</td>
      <td style="color:var(--green);font-weight:600">${r.concluidos??'—'}</td>
      <td>${tx!==null?`<div style="display:flex;align-items:center;gap:6px"><span style="font-weight:600">${tx}%</span><div class="prog-wrap" style="width:60px"><div class="prog-fill" style="width:${tx}%;background:${tx>=70?'var(--green)':tx>=40?'var(--amber)':'var(--red)'}"></div></div></div>`:'—'}</td>
    </tr>`;
  });
  h+=`</table></div>`;

  // Contexto por área
  h+=`<div class="section-label">Contexto por área</div>`;
  GESTORES.forEach(g=>{
    const snap=snaps[g],sem=getSemaforo(snap),r=snap?._estado?.resumo||{};
    const t=(r.abertos||0)+(r.concluidos||0),tx=t>0?Math.round((r.concluidos||0)/t*100):null;
    let frase;
    if(!snap)frase=`Snapshot não enviado — sem dados desta semana.`;
    else if(sem==='r')frase=`⚠️ ${r.urgentes} demanda${r.urgentes!==1?'s':''} urgente${r.urgentes!==1?'s':''} em aberto. Taxa de conclusão: ${tx!==null?tx+'%':'—'}. Requer atenção.`;
    else if(sem==='a')frase=`1 urgente em aberto. ${r.abertos} em andamento, ${r.concluidos} concluídas. Monitorar.`;
    else frase=`Semana sob controle. ${r.concluidos} concluída${r.concluidos!==1?'s':''}${r.abertos>0?`, ${r.abertos} em andamento`:''}.${tx!==null?' Taxa: '+tx+'%.':''}`;
    h+=`<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light)">
      ${avatarHtml(g,32)}
      <div style="flex:1"><div style="font-size:12px;font-weight:600">${g} <span style="font-weight:400;color:var(--text-3)">· ${AREAS[g]}</span></div>
      <div style="font-size:12px;color:var(--text-2);margin-top:3px;line-height:1.5">${frase}</div></div>
      <span class="sem-dot sem-${sem}" style="margin-top:4px;flex-shrink:0"></span>
    </div>`;
  });

  // Bloco IA
  h+=`<div class="section-label">Sugestões analíticas</div>
  <div class="ia-box">
    <div class="ia-title">🤖 Análise inteligente</div>
    <div id="ia-result">${iaGerado||`<div class="ia-loading">Clique para gerar sugestões com base nos dados desta semana.</div>`}</div>
    <button class="btn btn-primary" style="margin-top:.75rem;font-size:12px" onclick="gerarIA()">✨ Gerar análise da semana</button>
  </div>`;
  return h;
}

// ── GESTORES ──
function renderGestores(snaps,ativosSet){
  let h='';
  GESTORES.forEach(g=>{
    const snap=snaps[g],ativo=ativosSet.has(g),isOpen=openGestores.has(g);
    const r=snap?._estado?.resumo||{},sem=getSemaforo(snap);
    const t=(r.abertos||0)+(r.concluidos||0),tx=t>0?Math.round((r.concluidos||0)/t*100):null;
    const estado=snap?._estado||{};
    const briefing=estado.briefing||[];
    const alertas=(estado.alertas||[]).filter(a=>a.nivel);
    const fechamento=(estado.fechamento||[]).filter(f=>f.tipo==='p'&&!f.done&&!f.concluido);
    h+=`<div class="gestor-card">
      <div class="gestor-header" onclick="togGestor('${g}')">
        ${avatarHtml(g,42)}
        <div class="gestor-info">
          <div class="gestor-name">${g}</div>
          <div class="gestor-meta">${AREAS[g]} · ${ativo?'ativo esta semana':'inativo há 7+ dias'}</div>
        </div>
        <div class="gestor-right">
          ${snap?`<span style="font-size:11px;color:var(--text-3)">snapshot ${snap._dataFormatada}</span>`
                :`<button class="btn-lembrete" onclick="event.stopPropagation();enviarLembrete('${g}')">✉ Lembrar</button><span class="pill pill-a">sem snapshot</span>`}
          <span class="pill ${getSemaforoPill(sem)}">${getSemaforoLabel(sem)}</span>
          <span style="font-size:18px;color:var(--text-3);transition:transform .15s;${isOpen?'transform:rotate(180deg)':''}">▾</span>
        </div>
      </div>`;
    if(isOpen){
      h+=`<div class="gestor-body open">`;
      if(!snap){
        h+=`<div class="snap-no" style="margin-top:1rem">⚠️ Snapshot não enviado esta semana.<button class="btn-lembrete" onclick="enviarLembrete('${g}')">✉ Enviar lembrete</button></div>`;
      }else{
        h+=`<div class="snap-ok" style="margin-top:1rem">✓ Snapshot de ${snap._dataFormatada}</div>`;
        h+=`<div class="gestor-kpis">
          <div class="gkpi"><div class="gkpi-val" style="color:${(r.urgentes||0)>0?'var(--red)':'var(--text)'}">${r.urgentes||0}</div><div class="gkpi-lbl">Urgentes</div></div>
          <div class="gkpi"><div class="gkpi-val">${r.abertos||0}</div><div class="gkpi-lbl">Em aberto</div></div>
          <div class="gkpi"><div class="gkpi-val" style="color:var(--green)">${r.concluidos||0}</div><div class="gkpi-lbl">Concluídos</div></div>
          <div class="gkpi"><div class="gkpi-val" style="color:var(--amber)">${r.followupsPendentes||0}</div><div class="gkpi-lbl">Follow-ups</div></div>
        </div>`;
        if(tx!==null)h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem"><span style="font-size:12px;color:var(--text-3);flex-shrink:0">Taxa de conclusão</span><div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${tx}%;background:${tx>=70?'var(--green)':tx>=40?'var(--amber)':'var(--red)'}"></div></div><span style="font-size:12px;font-weight:600;flex-shrink:0">${tx}%</span></div>`;
        if(briefing.length){
          h+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin:12px 0 6px">Briefing</div>
          <table><tr><th>Demanda</th><th>Área</th><th>Status</th></tr>
          ${briefing.map(d=>{const done=d.done||d.concluido,urg=!done&&(d.status==='urgente'||d.urgente);const cls=done?'pill-g':urg?'pill-r':'pill-a';return`<tr style="${done?'opacity:.5':''}"><td style="font-size:12px;${done?'text-decoration:line-through':''}">${d.title||d.titulo||d.desc||'—'}</td><td style="font-size:11px">${d.area||'—'}</td><td><span class="pill ${cls}">${done?'Concluído':urg?'Urgente':'Em aberto'}</span></td></tr>`;}).join('')}</table>`;
        }
        if(alertas.length){
          h+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin:12px 0 6px">Alertas</div>`;
          alertas.forEach(a=>{h+=`<div class="al-item al-${a.nivel||'b'}"><div class="al-title">${a.title||a.titulo||'—'}</div>${a.desc?`<div class="al-desc">${a.desc}</div>`:''}</div>`;});
        }
        if(fechamento.length){
          h+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin:12px 0 6px">Pendências em aberto</div>`;
          fechamento.forEach(f=>{h+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-light)"><span class="pill pill-a" style="flex-shrink:0">Pendência</span><div style="flex:1;font-size:12px">${f.texto||'—'}</div><div style="font-size:11px;color:var(--text-3);flex-shrink:0">${f.resp||''} ${f.prazo?'· '+f.prazo:''}</div></div>`;});
        }
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  return h;
}
function togGestor(g){openGestores.has(g)?openGestores.delete(g):openGestores.add(g);renderizar();}

// ── ALERTAS ──
function renderAlertas(snaps){
  let h=`<div class="filter-bar">${['todos','v','a','b'].map((f,i)=>`<button class="filter-btn ${alertFilter===f?'on':''}" onclick="setAlertFilter('${f}')">${['Todos','🔴 Crítico','🟡 Atenção','🔵 Monitorar'][i]}</button>`).join('')}</div>`;
  const niveis=[['v','🔴 Crítico — ação imediata'],['a','🟡 Atenção — esta semana'],['b','🔵 Monitorar']];
  const rankAreas={};let totalMostrado=0;
  niveis.forEach(([n,lbl])=>{
    if(alertFilter!=='todos'&&alertFilter!==n)return;
    const its=[],seen=new Set();
    Object.entries(snaps).forEach(([g,snap])=>{
      (snap._estado?.alertas||[]).filter(a=>a.nivel===n).forEach(a=>{const k=a.title||a.titulo;if(!seen.has(k)){seen.add(k);its.push({gestor:g,...a});rankAreas[AREAS[g]]=(rankAreas[AREAS[g]]||0)+1;}});
    });
    dadosAlertas.filter(x=>x.nivel===n&&x.acao!=='deletou').forEach(a=>{const k=a.titulo||a.title;if(!seen.has(k)){seen.add(k);its.push({gestor:a.usuario,title:a.titulo,desc:a.descricao,acao:a.acao_recomendada});const ar=AREAS[a.usuario]||a.usuario||'?';rankAreas[ar]=(rankAreas[ar]||0)+1;}});
    if(!its.length)return;
    totalMostrado+=its.length;
    h+=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin:${totalMostrado===its.length?'0':'1.25rem'} 0 .6rem">${lbl}</div>`;
    its.forEach(a=>{h+=`<div class="al-item al-${n}"><div class="al-tag">${a.gestor||'—'}</div><div class="al-title">${a.title||a.titulo||'—'}</div>${a.desc||a.descricao?`<div class="al-desc">${a.desc||a.descricao}</div>`:''}${a.acao||a.acao_recomendada?`<div class="al-acao">→ ${a.acao||a.acao_recomendada}</div>`:''}</div>`;});
  });
  if(alertFilter==='todos'){
    const re=Object.entries(rankAreas).sort((a,b)=>b[1]-a[1]);
    if(re.length){
      h+=`<div class="section-label" style="margin-top:1.5rem">Áreas com mais alertas</div><div class="card">`;
      re.forEach(([area,qtd],i)=>{const pct=Math.round(qtd/Math.max(...re.map(x=>x[1]))*100);h+=`<div class="rank-item"><span style="font-size:11px;font-weight:700;color:var(--text-3);width:18px">${i+1}</span><div style="flex:1;margin-left:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:500">${area}</span><span style="font-size:12px;font-weight:700">${qtd}</span></div><div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${i===0?'var(--red)':i===1?'var(--amber)':'var(--blue)'}"></div></div></div></div>`;});
      h+=`</div>`;
    }
  }
  if(!totalMostrado)h+=`<div class="empty">Nenhum alerta no nível selecionado.</div>`;
  return h;
}
function setAlertFilter(f){alertFilter=f;renderizar();}

// ── PERFORMANCE ──
function renderPerformance(snaps){
  const porSemana={};
  dadosSnapshots.forEach(s=>{
    const d=new Date(s.data_hora||s.timestamp||0);if(isNaN(d))return;
    const ini=new Date(d);ini.setDate(d.getDate()-d.getDay()+1);ini.setHours(0,0,0,0);
    const key=ini.toLocaleDateString('pt-BR');
    if(!porSemana[key])porSemana[key]={semana:key,criadas:0,concluidas:0,alertasCrit:0,_date:ini};
    let estado={};try{estado=JSON.parse(s.estado||s.dados||'{}');}catch(e){}
    const r=estado.resumo||{};
    porSemana[key].criadas+=r.totalBriefing||((estado.briefing||[]).length);
    porSemana[key].concluidas+=r.concluidos||((estado.briefing||[]).filter(x=>x.done||x.concluido).length);
    porSemana[key].alertasCrit+=(estado.alertas||[]).filter(a=>a.nivel==='v').length;
  });
  const semanas=Object.values(porSemana).sort((a,b)=>a._date-b._date).slice(-8);
  let h='';
  if(semanas.length<3){
    h+=`<div class="perf-chart-empty">📈 Gráfico disponível após <strong>${3-semanas.length} semana${3-semanas.length!==1?'s':''}</strong> com snapshots acumulados.<br><span style="font-size:11px">${semanas.length} semana${semanas.length!==1?'s':''} com dados até agora.</span></div>`;
  }else{
    const maxV=Math.max(...semanas.map(s=>Math.max(s.criadas,s.concluidas,1)),1);
    const maxA=Math.max(...semanas.map(s=>s.alertasCrit),1);
    const W=600,H=160,pL=30,pR=10,pT=10,pB=30,aW=W-pL-pR,aH=H-pT-pB;
    const xS=aW/(semanas.length-1);
    const pts=(arr,mx)=>arr.map((s,i)=>`${pL+i*xS},${H-pB-s*aH/mx}`).join(' ');
    h+=`<div class="card"><div class="card-title">Evolução semanal — Demandas & Alertas Críticos</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
      <polyline points="${pts(semanas.map(s=>s.criadas),maxV)}" fill="none" stroke="var(--purple)" stroke-width="2" stroke-dasharray="4,3" opacity=".7"/>
      <polyline points="${pts(semanas.map(s=>s.concluidas),maxV)}" fill="none" stroke="var(--green)" stroke-width="2.5"/>
      <polyline points="${pts(semanas.map(s=>s.alertasCrit),maxA)}" fill="none" stroke="var(--red)" stroke-width="2" opacity=".8"/>
      ${semanas.map((s,i)=>`<text x="${pL+i*xS}" y="${H-8}" text-anchor="middle" font-size="9" fill="var(--text-3)">${s.semana.slice(0,5)}</text>`).join('')}
    </svg>
    <div style="display:flex;gap:16px;margin-top:.5rem;font-size:11px;flex-wrap:wrap">
      <span><span style="display:inline-block;width:16px;height:2px;background:var(--purple);opacity:.7;vertical-align:middle;margin-right:4px"></span>Criadas</span>
      <span><span style="display:inline-block;width:16px;height:2.5px;background:var(--green);vertical-align:middle;margin-right:4px"></span>Concluídas</span>
      <span><span style="display:inline-block;width:16px;height:2px;background:var(--red);opacity:.8;vertical-align:middle;margin-right:4px"></span>Alertas críticos</span>
    </div></div>`;
  }
  // Ranking conclusão
  h+=`<div class="section-label">Ranking de conclusão</div><div class="card">`;
  const rankCo=GESTORES.map(g=>{const r=snaps[g]?._estado?.resumo||{};const t=(r.abertos||0)+(r.concluidos||0);return{g,tx:t>0?Math.round((r.concluidos||0)/t*100):null,co:r.concluidos||0};}).filter(x=>x.tx!==null).sort((a,b)=>b.tx-a.tx);
  if(rankCo.length)rankCo.forEach(({g,tx,co})=>{h+=`<div class="rank-item">${avatarHtml(g,28)}<div style="flex:1;margin-left:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:500">${g}</span><span style="font-size:12px;font-weight:700">${tx}% <span style="font-weight:400;color:var(--text-3)">(${co} concluídas)</span></span></div><div class="prog-wrap"><div class="prog-fill" style="width:${tx}%;background:${tx>=70?'var(--green)':tx>=40?'var(--amber)':'var(--red)'}"></div></div></div></div>`;});
  else h+=`<div class="empty">Sem dados de conclusão esta semana.</div>`;
  h+=`</div>`;
  // Ranking urgentes
  h+=`<div class="section-label">Ranking de urgentes em aberto</div><div class="card">`;
  const rankUrg=GESTORES.map(g=>{const r=snaps[g]?._estado?.resumo||{};return{g,urg:r.urgentes||0};}).sort((a,b)=>b.urg-a.urg);
  const maxUrg=Math.max(...rankUrg.map(x=>x.urg),1);
  rankUrg.forEach(({g,urg})=>{h+=`<div class="rank-item">${avatarHtml(g,28)}<div style="flex:1;margin-left:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:500">${g}</span><span style="font-size:12px;font-weight:700;color:${urg>0?'var(--red)':'var(--green)'}">${urg} urgente${urg!==1?'s':''}</span></div><div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(urg/maxUrg*100)}%;background:${urg===0?'var(--green)':urg===1?'var(--amber)':'var(--red)'}"></div></div></div></div>`;});
  h+=`</div>`;
  return h;
}

// ── ATRASADAS ──
function renderAtrasadas(snaps){
  let h=`<div style="font-size:13px;color:var(--text-2);margin-bottom:1rem;line-height:1.6">Demandas marcadas como <strong>urgentes</strong> ainda em aberto no último snapshot de cada gestor.</div>`;
  let total=0;
  GESTORES.forEach(g=>{
    const snap=snaps[g];if(!snap)return;
    const bf=(snap._estado?.briefing||[]).filter(x=>!x.done&&!x.concluido&&(x.status==='urgente'||x.urgente));
    if(!bf.length)return;
    total+=bf.length;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin:14px 0 6px">${avatarHtml(g,28)}<span style="font-size:13px;font-weight:600">${g}</span><span style="font-size:11px;color:var(--text-3)">${AREAS[g]}</span><span class="pill pill-r">${bf.length} urgente${bf.length!==1?'s':''}</span></div>`;
    bf.forEach(d=>{h+=`<div class="atrasada-item"><div class="atrasada-title">${d.title||d.titulo||d.desc||'—'}</div><div class="atrasada-meta">${d.area||''}${d.semana?' · semana '+d.semana:''}</div></div>`;});
  });
  if(!total)h+=`<div class="empty">✅ Nenhuma demanda urgente em aberto nos snapshots recebidos.</div>`;
  return h;
}

// ── LEMBRETE VIA APPS SCRIPT (GET para evitar CORS) ──
async function enviarLembrete(gestor){
  const email=EMAILS[gestor];
  if(!email){alert('Email não configurado para '+gestor);return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Enviando...';
  try{
    const semana=new Date().toLocaleDateString('pt-BR');
    const url=`${APPS_SCRIPT_URL}?acao=enviarLembrete&gestor=${encodeURIComponent(gestor)}&email=${encodeURIComponent(email)}&semana=${encodeURIComponent(semana)}`;
    const r=await fetch(url,{redirect:'follow'});
    const data=await r.json();
    if(data.status==='ok'){btn.textContent='✓ Enviado';btn.style.color='var(--green)';}
    else{btn.textContent='Erro';btn.style.color='var(--red)';}
  }catch(e){btn.textContent='Erro ao enviar';}
  setTimeout(()=>{btn.disabled=false;btn.textContent='✉ Lembrar';btn.style.color='';},3000);
}

// ── IA VIA APPS SCRIPT GET (sem CORS) ──
async function gerarIA(){
  const snaps=getSnapshotPorGestor();
  const box=document.getElementById('ia-result');
  if(!box)return;
  box.innerHTML=`<div class="ia-loading"><div class="spinner" style="margin:0 auto 8px"></div>Analisando dados da semana...</div>`;

  const contexto=GESTORES.map(g=>{
    const snap=snaps[g];if(!snap)return`${g} (${AREAS[g]}): snapshot não enviado esta semana`;
    const r=snap._estado?.resumo||{};
    const alCrit=(snap._estado?.alertas||[]).filter(a=>a.nivel==='v').map(a=>a.title||a.titulo).filter(Boolean).join(', ');
    const pend=(snap._estado?.fechamento||[]).filter(f=>f.tipo==='p'&&!f.done).map(f=>f.texto).filter(Boolean).slice(0,2).join('; ');
    return`${g} (${AREAS[g]}): ${r.urgentes||0} urgentes, ${r.abertos||0} em aberto, ${r.concluidos||0} concluídas${alCrit?` | alertas: ${alCrit}`:''}${pend?` | pendências: ${pend}`:''}`;
  }).join(' | ');

  const prompt=`Você é consultor sênior da Road.ag, agência de marketing digital brasileira. Analise os dados e gere 3 a 5 sugestões CONCRETAS para Vinicius (fundador) e Sabrina (CEO). Cada sugestão: nome a pessoa/área, descreva a situação em 1 frase, recomende ação específica. Responda APENAS JSON sem markdown: {"sugestoes":[{"titulo":"...","contexto":"...","acao":"..."}]} Dados: ${contexto}`;

  try{
    const url=`${APPS_SCRIPT_URL}?acao=gerarIA&prompt=${encodeURIComponent(prompt)}`;
    const r=await fetch(url,{redirect:'follow'});
    const data=await r.json();
    if(data.status!=='ok'||!data.resultado){
      box.innerHTML=`<div style="font-size:12px;color:var(--red)">Erro: ${data.erro||'Resposta inválida'}. Verifique se a chave ANTHROPIC_KEY está configurada nas propriedades do script.</div>`;
      return;
    }
    let sugestoes=[];
    try{sugestoes=JSON.parse(data.resultado.replace(/```json|```/g,'').trim()).sugestoes||[];}
    catch(e){sugestoes=[{titulo:'Análise gerada',contexto:data.resultado,acao:''}];}
    iaGerado=sugestoes.map(s=>`<div class="ia-item"><div style="font-size:12px;font-weight:700;color:var(--deep);margin-bottom:3px">${s.titulo}</div><div class="ia-item-text">${s.contexto}</div>${s.acao?`<div style="font-size:11px;font-weight:600;color:var(--purple);margin-top:5px">→ ${s.acao}</div>`:''}</div>`).join('');
    box.innerHTML=iaGerado;
  }catch(e){
    box.innerHTML=`<div style="font-size:12px;color:var(--red)">Erro de conexão com o servidor.</div>`;
  }
}

  <div class="hdr"><div class="logo">Road.ag</div><div><div style="font-size:13px;font-weight:600">Relatório Semanal</div><div style="font-size:11px;color:#9c9a94">${hoje}</div></div></div>`;

    html+=`</table>`;
  }

    ['v','a'].forEach(n=>{const its=[],seen=new Set();Object.values(snaps).forEach(s=>(s._estado?.alertas||[]).filter(a=>a.nivel===n).forEach(a=>{const k=a.title||a.titulo;if(!seen.has(k)){seen.add(k);its.push(a);}}));dadosAlertas.filter(x=>x.nivel===n&&x.acao!=='deletou').forEach(a=>{const k=a.titulo||a.title;if(!seen.has(k)){seen.add(k);its.push({title:a.titulo,desc:a.descricao});}});its.forEach(a=>{html+=`<div class="al al-${n}"><strong style="font-size:11px">${a.title||a.titulo||'—'}</strong>${a.desc?`<div style="font-size:10px;margin-top:2px">${a.desc}</div>`:''}</div>`;});});

    GESTORES.forEach(g=>{const snap=snaps[g];if(!snap)return;(snap._estado?.fechamento||[]).filter(f=>f.tipo==='p'&&!f.done).forEach(f=>{html+=`<tr><td style="font-weight:600">${g}</td><td>${f.texto||'—'}</td><td style="color:#9c9a94">${f.prazo||'—'}</td></tr>`;});});

  if(inc.briefing){html+=`<h2>Briefings da semana</h2>`;GESTORES.forEach(g=>{const snap=snaps[g];if(!snap)return;const bf=snap._estado?.briefing||[];if(!bf.length)return;html+=`<div style="font-weight:600;font-size:11px;margin:8px 0 3px">${g}</div>`;bf.forEach(d=>{html+=`<div style="font-size:11px;padding:3px 0;border-bottom:1px solid #f0eeea;${d.done?'text-decoration:line-through;color:#9c9a94':''}">${d.title||d.titulo||'—'}</div>`;});});}

  html+=`</body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
}
